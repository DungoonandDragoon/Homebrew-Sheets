<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homebrew Sheet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0d0d0f;
      color: #e8e0d0;
    }
    .header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid #2a2a3a;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #c9a84c;
      margin-bottom: 2px;
    }
    .subtitle { font-size: 11px; color: #5a5548; }
    .section { padding: 10px 14px; border-bottom: 1px solid #1a1a24; }
    .section-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5a5548;
      margin-bottom: 6px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #8a8070;
      margin-bottom: 4px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5a5548;
    }
    .dot.green { background: #27ae60; }
    .dot.amber { background: #c9a84c; }
    .btn {
      display: block;
      width: 100%;
      padding: 8px 10px;
      background: rgba(201,168,76,0.1);
      border: 1px solid #7a6030;
      border-radius: 5px;
      color: #c9a84c;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(201,168,76,0.2); }
    .footer {
      padding: 8px 14px;
      font-size: 10px;
      color: #3a3a4a;
      text-align: center;
    }
    #last-roll {
      background: #13131a;
      border-radius: 5px;
      padding: 8px 10px;
      margin-top: 6px;
    }
    #last-roll-label { font-size: 10px; color: #5a5548; margin-bottom: 2px; }
    #last-roll-total { font-size: 22px; font-weight: 600; color: #c9a84c; line-height: 1; }
    #last-roll-breakdown { font-size: 10px; color: #5a5548; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">⚔ Homebrew Sheet</div>
    <div class="subtitle">DnDBeyond Roll Bridge</div>
  </div>

  <div class="section">
    <div class="section-label">Status</div>
    <div class="status-row">
      <div class="dot" id="ddb-dot"></div>
      <span id="ddb-status">Checking for DnDBeyond tab…</span>
    </div>
    <div class="status-row">
      <div class="dot" id="sheet-dot"></div>
      <span id="sheet-status">Homebrew Sheet not detected</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Last roll</div>
    <div id="last-roll">
      <div id="last-roll-label">No rolls yet</div>
      <div id="last-roll-total"></div>
      <div id="last-roll-breakdown"></div>
    </div>
  </div>

  <div class="section">
    <button class="btn" id="open-sheet">Open Homebrew Sheet</button>
  </div>

  <div class="footer">Rolls are forwarded to all open DnDBeyond tabs</div>

  <script src="popup.js"></script>
</body>
</html>
